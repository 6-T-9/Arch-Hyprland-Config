conky.config = {
    background = true,
    update_interval = 1,

    out_to_x = false,
    out_to_wayland = true,

    own_window = true,
    own_window_type = 'override',

    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 80,      
    own_window_colour = "#ffdad5",

    alignment = 'bottom_left',
    gap_x = 20,
    gap_y = 20,                     

    border_inner_margin = 0,

    double_buffer = true,

    use_xft = true,
    xftalpha = 1,

    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    uppercase = true,
};

conky.text = [[
${offset 20}${alignc}${color #ffdad5}${font Rubik:medium:size=70}${time %d}${font}${offset 20}
${voffset 10}${alignc}${color #ffdad5}${font Rubik:medium:size=12}${time %B}${font}
]];
